# ─────────────────────────────────────────────────────────────────────────
# 나머지 master 2대(a-master-01, a-master-02)를 컨트롤플레인에 추가.
# 두 단계로 나눠짐:
#
#   1) main-master 에서 join 토큰 + 인증서 키 생성 → 임시 메모리에 저장
#   2) AZ A 의 master 2대가 그 정보로 'kubeadm join --control-plane' 실행
#
# 왜 두 plays 로 나눠?
#   - 1 단계는 main-master 에서만 정보 추출
#   - 2 단계는 AZ A masters 로 그 정보 전달해서 join
#   - 두 호스트 그룹이 다르니 plays 분리 필수
#
# K8S_VARS_HOLDER 가 뭐야?
#   - Ansible 의 'add_host' 모듈이 만드는 임시 가상 호스트.
#   - 변수를 다른 plays 로 전달하는 트릭.
#     hostvars['K8S_VARS_HOLDER']['shared_join_cmd'] 형태로 다음 play 에서 접근 가능.
# ─────────────────────────────────────────────────────────────────────────


# ─── Play 1: main-master 에서 join 토큰 + 인증서 키 추출 ──────────
- name: 마스터 노드 join 정보 추출
  hosts: main-master
  become: true
  tasks:

    # 인증서 키 = 다른 master 가 등록할 때 control plane 인증서를 받아갈 수 있는 임시 비밀번호.
    # 'tail -n 1' : 명령어 출력 마지막 줄만 뽑음 (앞에 있는 안내 문구 제거).
    - name: 인증서 키 생성 (다른 master 가 받아갈 임시 키)
      ansible.builtin.shell: kubeadm init phase upload-certs --upload-certs | tail -n 1
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cert_key_raw

    # join 토큰 = 노드가 클러스터에 합류할 때 쓰는 비밀번호.
    # 출력 예: "kubeadm join 1.2.3.4:6443 --token abc.123... --discovery-token-ca-cert-hash sha256:..."
    - name: join 명령어 생성
      ansible.builtin.shell: kubeadm token create --print-join-command
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: join_cmd_raw

    # 두 정보를 임시 가상 호스트(K8S_VARS_HOLDER)에 변수로 저장.
    # 다음 play 에서 hostvars['K8S_VARS_HOLDER']['shared_join_cmd'] 로 접근.
    #
    # ansible_connection=local 이 핵심 — 이 가상 host 는 변수 holder 로만 쓸 거라
    # SSH 시도하면 안 됨. 이거 없으면 add_host 후 inventory 에 등록된 'K8S_VARS_HOLDER' 가
    # 'hosts: all' 패턴을 가진 다음 playbook (예: ecr-credential-provider-setup) 에서
    # 매칭되어 SSH 시도 → 가짜 host 라 unreachable=1 → ansible exit code 비-0 → bootstrap 실패.
    - name: join 정보를 다음 play 로 전달 (가상 호스트 사용)
      ansible.builtin.add_host:
        name: "K8S_VARS_HOLDER"
        ansible_connection: local                 # SSH 안 함 (변수 holder 전용)
        shared_join_cmd: "{{ join_cmd_raw.stdout | trim }}"
        shared_cert_key: "{{ cert_key_raw.stdout | trim }}"


# ─── Play 2: AZ A 의 master 2대가 control plane 으로 join ────────
- name: AZ A 마스터들 컨트롤플레인 join
  hosts: ap-northeast-2a-masters                   # a-master-01, a-master-02
  become: true
  tasks:

    # 위에서 받은 join 명령어 + --control-plane + --certificate-key + --cri-socket 옵션 추가:
    #   --control-plane             : worker 가 아니라 master 로 합류
    #   --certificate-key           : control plane 인증서 받아갈 임시 키
    #   --cri-socket containerd...  : Docker 가 아니라 containerd 쓰겠다고 명시
    #
    # failed_when:
    #   기본은 rc(=종료코드) != 0 이면 실패. 그런데 'already exists' 메시지는
    #   "이미 join 됨" 이라는 멱등성 케이스라 실패로 보지 않음 (재실행해도 OK).
    - name: kubeadm join (control-plane 모드)
      ansible.builtin.shell: >
        {{ hostvars['K8S_VARS_HOLDER']['shared_join_cmd'] }} --control-plane
        --certificate-key {{ hostvars['K8S_VARS_HOLDER']['shared_cert_key'] }}
        --cri-socket unix:///var/run/containerd/containerd.sock
      register: master_join_result
      when: hostvars['K8S_VARS_HOLDER']['shared_join_cmd'] is defined
      failed_when:
        - master_join_result.rc != 0
        - "'already exists' not in master_join_result.stderr"
