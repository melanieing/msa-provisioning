- name: Kubernetesクラスタのクリーンアップ
  hosts: all
  become: true
  tasks:
    - name: kubeadm resetコマンドの実行
      ansible.builtin.shell: |
        kubeadm reset -f --cri-socket unix:///var/run/containerd/containerd.sock
      register: reset_result
      changed_when: true

    - name: Kubernetes関連のディレクトリとファイルの削除
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes/
        - /var/lib/etcd/
        - /var/lib/kubelet/
        - /etc/cni/net.d/
        - /var/lib/cni/

    - name: kubeconfigファイルの削除
      ansible.builtin.file:
        path: /home/ec2-user/.kube/
        state: absent

    - name: ネットワークインターフェースのクリーンアップ
      ansible.builtin.shell: |
        ip link delete cni0 || true
        ip link delete flannel.1 || true
        ip link delete cali || true
      changed_when: true
      ignore_errors: true

    - name: containerdサービスの再起動
      ansible.builtin.systemd:
        name: containerd
        state: restarted
