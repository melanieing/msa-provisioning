- name: AWS Load Balancer Controller設置
  hosts: main-master
  become: true
  vars:
    cluster_name: "kt-cloud-cluster"
    aws_region: "ap-northeast-2"
    lbc_namespace: "kube-system"

  tasks:
    - name: EKS Helmリポジトリの追加
      kubernetes.core.helm_repository:
        name: eks
        repo_url: "https://aws.github.io/eks-charts"

    - name: Helmリポジトリの更新
      command: helm repo update

    - name: AWS Load Balancer Controllerのインストール
      kubernetes.core.helm:
        name: aws-load-balancer-controller
        chart_ref: eks/aws-load-balancer-controller
        release_namespace: "{{ lbc_namespace }}"
        kubeconfig: "/home/ec2-user/.kube/config"
        create_namespace: true
        values:
          clusterName: "{{ cluster_name }}"
          serviceAccount:
            create: true
            name: aws-load-balancer-controller
          vpcId: "{{ vpc_id }}"
          region: "{{ aws_region }}"
      register: helm_install_result
