# ─────────────────────────────────────────────────────────────────────────
# worker 노드 3대를 클러스터에 join.
#   - a-worker-01 (AZ A)
#   - b-worker-01, b-worker-02 (AZ B)
#
# join-master.yaml 과 비슷하지만 worker 는 control plane 인증서 받을 필요 없어서
# 더 단순함 (--control-plane / --certificate-key 옵션 없음).
# ─────────────────────────────────────────────────────────────────────────


# ─── Play 1: main-master 에서 join 토큰만 추출 ────────────────────
- name: 워커 노드 join 토큰 추출
  hosts: main-master
  become: true
  tasks:

    - name: join 명령어 생성
      ansible.builtin.shell: kubeadm token create --print-join-command
      register: join_command_raw

    # 이번엔 add_host 안 쓰고 set_fact 사용 (간단해서).
    # main-master 의 hostvars 에 'join_command' 저장 → 다음 play 에서 hostvars['main-master']['join_command'] 로 접근.
    - name: join 명령어를 hostvars 에 저장
      ansible.builtin.set_fact:
        join_command: "{{ join_command_raw.stdout }}"


# ─── Play 2: 모든 worker 가 join ──────────────────────────────────
- name: 워커 노드들 클러스터 join
  hosts: ap-northeast-2a-workers,ap-northeast-2b-workers
  become: true
  tasks:

    # join 명령어 끝에 --cri-socket 만 추가. control plane 옵션 X.
    - name: kubeadm join (worker 모드)
      ansible.builtin.shell: "{{ hostvars['main-master']['join_command'] }}
        --cri-socket unix:///var/run/containerd/containerd.sock"
      register: join_result
      failed_when:
        - join_result.rc != 0
        - "'already exists' not in join_result.stderr"   # 이미 join 됐으면 실패 아님
