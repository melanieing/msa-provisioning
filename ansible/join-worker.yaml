- name: KubernetesクラスタのマスターノードのJoin情報の取得
  hosts: main-master
  become: true
  tasks:
    - name: Joinコマンドの取得
      ansible.builtin.shell: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Joinコマンドの保存
      ansible.builtin.set_fact:
        join_command: "{{ join_command_raw.stdout }}"

- name: KubernetesクラスタのワーカーノードのJoin
  hosts: ap-northeast-2a-workers,ap-northeast-2b-workers
  become: true
  tasks:
    - name: Joinコマンドの実行
      ansible.builtin.shell: "{{ hostvars['main-master']['join_command'] }}
        --cri-socket unix:///var/run/containerd/containerd.sock"
      register: join_result
      failed_when:
        - join_result.rc != 0
        - "'already exists' not in join_result.stderr"
