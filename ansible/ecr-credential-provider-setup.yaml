# ─────────────────────────────────────────────────────────────────────────
# 모든 노드에 ECR credential provider 플러그인 설치 + kubelet 연동.
#
# 왜 필요한가?
#   K8s 1.27 부터 kubelet 의 "in-tree" ECR 자격증명 제공자가 제거됨
#   (https://github.com/kubernetes/kubernetes/pull/118077).
#   그래서 K8s 1.27+ 에서 EC2 의 IAM Role 만으로는 kubelet 이 ECR pull 못 함.
#   → kubelet 이 "no basic auth credentials" 에러 발생.
#
# 해결책 (KEP-2133):
#   "external credential provider" 플러그인을 노드에 설치하고 kubelet 이
#   `*.dkr.ecr.*.amazonaws.com` 같은 패턴 매칭 시 그 플러그인을 호출해
#   IAM Role 토큰 받아 사용. cloud-provider-aws 가 이 플러그인 (`ecr-credential-provider`)
#   바이너리를 release 함.
#
# 설치 후 확인:
#   bastion 통해 master 들어가서:
#     kubectl describe pod <ECR-image-Pod> -A | grep -A 3 'Failed'
#   더 이상 'no basic auth credentials' 안 나와야 함.
#
# 관련 BACKLOG: 이슈 E (2026-05-10 발견).
# ─────────────────────────────────────────────────────────────────────────

- name: ECR credential provider (K8s 1.27+ 의 외부 자격증명 플러그인) 설치
  hosts: all                                       # master + worker 모두 (둘 다 ECR pull 필요)
  become: true

  vars:
    # ECR credential provider 바이너리는 cloud-provider-aws 의 release asset 으로 제공되지 않음.
    # 대신 AWS 가 EKS-optimized AMI 용으로 공개 S3 버킷 'amazon-eks' 에 K8s version + build date 별로 발행.
    # 같은 바이너리를 self-managed K8s 에서도 사용 가능 (특수한 EKS 의존성 없음).
    #
    # URL 패턴: https://amazon-eks.s3.us-west-2.amazonaws.com/<k8s-version>/<build-date>/bin/linux/amd64/ecr-credential-provider
    #
    # 새 K8s minor 로 업그레이드 시 둘 다 갱신:
    #   1. 사용 가능한 build date 확인:
    #      curl -s 'https://amazon-eks.s3.us-west-2.amazonaws.com/?prefix=<k8s-version>/&delimiter=/' | grep Prefix
    #   2. 최신 build date 로 ecr_provider_build_date 변경
    k8s_version: "1.35.4"                          # STACK.md 와 일치
    ecr_provider_build_date: "2026-04-28"          # amazon-eks S3 의 최신 publish 날짜 (2026-05-10 기준)
    ecr_provider_url: "https://amazon-eks.s3.us-west-2.amazonaws.com/{{ k8s_version }}/{{ ecr_provider_build_date }}/bin/linux/amd64/ecr-credential-provider"

    # 플러그인 바이너리/설정 파일 위치 (kubelet 표준 경로 패턴)
    ecr_provider_dir: /etc/kubernetes/credential-providers
    ecr_provider_bin_dir: "{{ ecr_provider_dir }}/bin"
    ecr_provider_config_file: "{{ ecr_provider_dir }}/config.yaml"

    # kubelet config 파일 (kubeadm-installed cluster 표준)
    kubelet_config_file: /var/lib/kubelet/config.yaml

  tasks:

    # ─── 1. 디렉토리 생성 ──────────────────────────────────────────
    - name: credential provider 디렉토리 생성
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ ecr_provider_dir }}"
        - "{{ ecr_provider_bin_dir }}"

    # ─── 2. 바이너리 다운로드 ──────────────────────────────────────
    # cloud-provider-aws release 의 ecr-credential-provider 바이너리를
    # 각 노드에 직접 다운로드. crc 체크는 release page 에 SHA256 가 있지만 단순화.
    - name: ecr-credential-provider 바이너리 다운로드
      ansible.builtin.get_url:
        url: "{{ ecr_provider_url }}"
        dest: "{{ ecr_provider_bin_dir }}/ecr-credential-provider"
        mode: "0755"
        # 이미 같은 버전이 있으면 재다운로드 안 함 (idempotent)
        force: false

    # ─── 3. credential provider config 작성 ───────────────────────
    # kubelet 이 어떤 image pattern 을 만나면 어떤 플러그인을 호출할지 명시.
    # `matchImages` 패턴이 매칭되면 kubelet 이 플러그인 실행 → 토큰 받아 사용.
    - name: credential provider config 파일 작성
      ansible.builtin.copy:
        dest: "{{ ecr_provider_config_file }}"
        mode: "0644"
        content: |
          # K8s 1.27+ 의 external credential provider 설정.
          # 이 파일을 kubelet 이 --image-credential-provider-config 로 참조.
          apiVersion: kubelet.config.k8s.io/v1
          kind: CredentialProviderConfig
          providers:
            - name: ecr-credential-provider               # bin_dir 안의 바이너리 파일명과 일치해야 함
              matchImages:
                # ECR 의 모든 region / partition 패턴 매칭
                - "*.dkr.ecr.*.amazonaws.com"
                - "*.dkr.ecr-fips.*.amazonaws.com"
                - "*.dkr.ecr.us-iso-east-1.c2s.ic.gov"
                - "*.dkr.ecr.us-isob-east-1.sc2s.sgov.gov"
              # 토큰 캐시 시간. ECR 토큰은 12h 유효, 보수적으로 10m 캐시.
              defaultCacheDuration: "12h"
              # 플러그인이 응답할 때 사용할 schema
              apiVersion: credentialprovider.kubelet.k8s.io/v1

    # ─── 4. kubelet flag 추가 (CLI flag 방식) ─────────────────────
    # K8s 1.35 의 KubeletConfiguration struct 에는 imageCredentialProvider* 필드가
    # 없음 (확인됨: kubelet 의 strict decoding 이 "unknown field" 에러로 무시).
    # → CLI flag 로 설정해야 함:
    #     --image-credential-provider-config
    #     --image-credential-provider-bin-dir
    # kubeadm 관용 위치는 /etc/sysconfig/kubelet 의 KUBELET_EXTRA_ARGS.
    # systemd unit drop-in (/etc/systemd/system/kubelet.service.d/10-kubeadm.conf) 이
    # EnvironmentFile=-/etc/sysconfig/kubelet 로 자동 read.
    - name: KUBELET_EXTRA_ARGS 에 credential provider CLI flag 설정
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/kubelet
        regexp: '^KUBELET_EXTRA_ARGS='
        line: 'KUBELET_EXTRA_ARGS="--image-credential-provider-config={{ ecr_provider_config_file }} --image-credential-provider-bin-dir={{ ecr_provider_bin_dir }}"'
        create: true                                # 파일 없으면 생성
        mode: "0644"

    # ─── 5. kubelet 재시작 ─────────────────────────────────────────
    # config 변경 후 kubelet 재시작 필요. daemon-reload 도 같이.
    # 짧은 순간 (~5s) Pod 상태 update 가 멈추지만 Pod 자체는 계속 실행.
    - name: kubelet 재시작 (credential provider 설정 적용)
      ansible.builtin.systemd:
        name: kubelet
        state: restarted
        daemon_reload: true

    # ─── 6. (검증) 바이너리 정상 실행 가능한지 확인 ───────────────
    # 플러그인은 stdin 으로 요청 받고 stdout 으로 응답. 헬프 옵션이 있나 확인.
    - name: ecr-credential-provider 바이너리 실행 가능 확인
      ansible.builtin.command:
        cmd: "{{ ecr_provider_bin_dir }}/ecr-credential-provider --help"
      register: ecr_help
      changed_when: false
      failed_when: ecr_help.rc != 0 and 'Usage' not in ecr_help.stderr

    - name: 결과 요약
      ansible.builtin.debug:
        msg: "ecr-credential-provider (K8s {{ k8s_version }}, build {{ ecr_provider_build_date }}) 설치 완료. kubelet 재시작 OK."
